server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback：所有 client-side route 都 fallback 到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源長 cache（hashed filename 已由 vite 處理）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
