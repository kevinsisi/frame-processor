name: frame-processor

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      POSTGRES_USER: frame
      POSTGRES_PASSWORD: frame
      POSTGRES_DB: frame_processor
    volumes:
      - type: bind
        source: G:/frame-processor/postgres-data
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frame -d frame_processor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - type: bind
        source: G:/frame-processor/redis-data
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ${DOCKERHUB_USERNAME:-kevin950805}/frame-processor-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      DATABASE_URL: postgresql+psycopg://frame:frame@postgres:5432/frame_processor
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data
      ALLOWED_ORIGINS: https://frame.sisihome.org,http://localhost:5173,http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      KEY_MANAGER_URL: ${KEY_MANAGER_URL:-}
      ULTRALYTICS_DIR: /data/models-weights/ultralytics
      NAFNET_DIR: /data/models-weights/nafnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: G:/frame-processor/storage-data
        target: /data
    command: ["sh", "-c", "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"]

  worker:
    image: ${DOCKERHUB_USERNAME:-kevin950805}/frame-processor-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      DATABASE_URL: postgresql+psycopg://frame:frame@postgres:5432/frame_processor
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      KEY_MANAGER_URL: ${KEY_MANAGER_URL:-}
      ULTRALYTICS_DIR: /data/models-weights/ultralytics
      NAFNET_DIR: /data/models-weights/nafnet
      YOLO_CONFIG_DIR: /data/models-weights/ultralytics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: G:/frame-processor/storage-data
        target: /data
    command: ["python", "-m", "worker.main"]

  web:
    image: ${DOCKERHUB_USERNAME:-kevin950805}/frame-processor-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
    ports:
      - "18533:80"
    depends_on:
      - api
