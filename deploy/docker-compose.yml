name: frame-processor

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frame
      POSTGRES_PASSWORD: frame
      POSTGRES_DB: frame_processor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frame -d frame_processor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://frame:frame@postgres:5432/frame_processor
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data
      ALLOWED_ORIGINS: https://frame.sisihome.org,http://localhost:5173,http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      KEY_MANAGER_URL: ${KEY_MANAGER_URL:-}
      ULTRALYTICS_DIR: /data/models-weights/ultralytics
      NAFNET_DIR: /data/models-weights/nafnet
    ports:
      - "127.0.0.1:8633:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage-data:/data
    command: ["sh", "-c", "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"]

  worker:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://frame:frame@postgres:5432/frame_processor
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      KEY_MANAGER_URL: ${KEY_MANAGER_URL:-}
      ULTRALYTICS_DIR: /data/models-weights/ultralytics
      NAFNET_DIR: /data/models-weights/nafnet
      YOLO_CONFIG_DIR: /data/models-weights/ultralytics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage-data:/data
    command: ["python", "-m", "worker.main"]

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
    ports:
      - "100.83.112.20:8533:80"
    depends_on:
      - api

volumes:
  postgres-data:
  storage-data:
