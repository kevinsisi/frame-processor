name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest
      - name: Ruff lint
        run: ruff check .
      - name: Python tests
        run: pytest tests
      - name: Import smoke test
        run: |
          python -c "from api.main import app; print('api ok')"
          python -c "import worker.jobs, worker.main; print('worker ok')"
          python -c "from models import Project, Photo, Export; print('models ok')"
      - name: Alembic offline migration check
        run: alembic upgrade head --sql > /dev/null
        env:
          DATABASE_URL: postgresql+psycopg://frame:frame@localhost:5432/frame_processor

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/api.Dockerfile
          push: false
          tags: frame-processor-api:ci
          cache-from: type=gha,scope=ci-api
          cache-to: type=gha,mode=max,scope=ci-api
          provenance: false
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/web.Dockerfile
          push: false
          tags: frame-processor-web:ci
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=ci-web
          cache-to: type=gha,mode=max,scope=ci-web
          provenance: false
