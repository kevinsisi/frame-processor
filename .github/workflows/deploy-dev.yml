name: Deploy Desktop

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_SERVER_IP: 100.83.112.20
  DEPLOY_PATH: D:/GitClone/_HomeProject/frame-processor/deploy
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'kevin950805' }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
  GEMINI_MODEL: gemini-2.5-flash
  HEALTH_URL: http://100.83.112.20:18533/api/health
  EXPECTED_APP_VERSION: "0.5.1"
  EXPECTED_POSTGRES_DIR: G:/frame-processor/postgres-data
  EXPECTED_STORAGE_DIR: G:/frame-processor/storage-data
  EXPECTED_REDIS_DIR: G:/frame-processor/redis-data

jobs:
  deploy-desktop:
    runs-on: [self-hosted, Windows, X64, frame-processor-prod]
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required inputs
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: powershell
        run: |
          $missing = @()
          if (-not $env:DOCKERHUB_USERNAME) { $missing += 'DOCKERHUB_USERNAME' }
          if (-not $env:DOCKERHUB_TOKEN) { $missing += 'DOCKERHUB_TOKEN' }
          if (-not $env:DEPLOY_PATH) { $missing += 'DEPLOY_PATH' }
          if (-not $env:EXPECTED_APP_VERSION) { $missing += 'EXPECTED_APP_VERSION' }
          if (-not $env:HEALTH_URL) { $missing += 'HEALTH_URL' }
          if (-not $env:EXPECTED_POSTGRES_DIR) { $missing += 'EXPECTED_POSTGRES_DIR' }
          if (-not $env:EXPECTED_STORAGE_DIR) { $missing += 'EXPECTED_STORAGE_DIR' }
          if (-not $env:EXPECTED_REDIS_DIR) { $missing += 'EXPECTED_REDIS_DIR' }
          if ($missing.Count -gt 0) {
            throw ('Missing required deploy inputs: ' + ($missing -join ', '))
          }

      - name: Sync docker-compose.yml locally
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:DEPLOY_PATH | Out-Null
          Copy-Item -LiteralPath 'deploy/docker-compose.yml' -Destination (Join-Path $env:DEPLOY_PATH 'docker-compose.yml') -Force

      - name: Merge deploy environment locally
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SETTINGS_ADMIN_TOKEN: ${{ secrets.SETTINGS_ADMIN_TOKEN }}
          KEY_MANAGER_URL: ${{ secrets.KEY_MANAGER_URL }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $envPath = Join-Path $env:DEPLOY_PATH '.env'
          $incomingPath = Join-Path $env:DEPLOY_PATH '.env.ci'
          if (!(Test-Path -LiteralPath $envPath)) { New-Item -ItemType File -Path $envPath | Out-Null }

          $incomingLines = @(
            "DOCKERHUB_USERNAME=$env:DOCKERHUB_USERNAME",
            "IMAGE_TAG=$env:IMAGE_TAG",
            "GEMINI_MODEL=$env:GEMINI_MODEL"
          )
          if ($env:GEMINI_API_KEY) { $incomingLines += "GEMINI_API_KEY=$env:GEMINI_API_KEY" }
          if ($env:SETTINGS_ADMIN_TOKEN) { $incomingLines += "SETTINGS_ADMIN_TOKEN=$env:SETTINGS_ADMIN_TOKEN" }
          if ($env:KEY_MANAGER_URL) { $incomingLines += "KEY_MANAGER_URL=$env:KEY_MANAGER_URL" }

          $utf8NoBom = New-Object System.Text.UTF8Encoding -ArgumentList $false
          [System.IO.File]::WriteAllLines($incomingPath, [string[]]$incomingLines, $utf8NoBom)

          function Read-EnvNames([string]$Path) {
            if (!(Test-Path -LiteralPath $Path)) { return @() }
            @(Get-Content -LiteralPath $Path | Where-Object { $_ -match '^[A-Za-z_][A-Za-z0-9_]*=' } | ForEach-Object { ($_ -split '=', 2)[0] })
          }

          function Read-EnvValue([string]$Path, [string]$Name) {
            if (!(Test-Path -LiteralPath $Path)) { return $null }
            $line = Get-Content -LiteralPath $Path | Where-Object { $_ -match ('^' + [regex]::Escape($Name) + '=') } | Select-Object -Last 1
            if (-not $line) { return $null }
            return ($line -replace ('^' + [regex]::Escape($Name) + '='), '').Trim().Trim('"')
          }

          $incomingNames = Read-EnvNames $incomingPath
          $existingLines = @(Get-Content -LiteralPath $envPath | Where-Object {
            $line = $_
            -not ($incomingNames | Where-Object { $line -match ('^' + [regex]::Escape($_) + '=') })
          })
          $mergedLines = @($existingLines + (Get-Content -LiteralPath $incomingPath))
          [System.IO.File]::WriteAllLines($envPath, [string[]]$mergedLines, $utf8NoBom)
          Remove-Item -LiteralPath $incomingPath -Force

          if (-not (Read-EnvValue $envPath 'DOCKERHUB_USERNAME')) { throw 'Missing DOCKERHUB_USERNAME in deploy .env after merge.' }
          if (-not (Read-EnvValue $envPath 'IMAGE_TAG')) { throw 'Missing IMAGE_TAG in deploy .env after merge.' }
          if (-not (Read-EnvValue $envPath 'SETTINGS_ADMIN_TOKEN')) { throw 'Missing SETTINGS_ADMIN_TOKEN in deploy .env after merge.' }

      - name: Validate G drive volume mapping
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Normalize-PathValue([string]$Value) {
            if (-not $Value) { return $null }
            $path = $Value.Replace('\', '/').TrimEnd('/')
            if ($path -match '^/run/desktop/mnt/host/([a-zA-Z])/(.+)') {
              return ($Matches[1].ToUpper() + ':/' + $Matches[2]).TrimEnd('/')
            }
            if ($path -match '^/host_mnt/([a-zA-Z])/(.+)') {
              return ($Matches[1].ToUpper() + ':/' + $Matches[2]).TrimEnd('/')
            }
            return $path
          }

          function Assert-PathExists([string]$Path) {
            if (!(Test-Path -LiteralPath $Path)) { throw ('Missing required deploy data path: ' + $Path) }
          }

          function Assert-ComposeBind([object]$Config, [string]$Service, [string]$Target, [string]$ExpectedSource) {
            $serviceProperty = $Config.services.PSObject.Properties[$Service]
            if ($null -eq $serviceProperty) { throw ('Missing compose service: ' + $Service) }
            $serviceConfig = $serviceProperty.Value
            $foundVolumes = @($serviceConfig.volumes | Where-Object { $_.target -eq $Target })
            if ($foundVolumes.Count -ne 1) { throw ('Service ' + $Service + ' must have exactly one volume for ' + $Target) }

            $volume = $foundVolumes[0]
            $actualType = [string]$volume.type
            $actualSource = Normalize-PathValue ([string]$volume.source)
            $expectedSource = Normalize-PathValue $ExpectedSource
            if ($actualType -ne 'bind') { throw ('Service ' + $Service + ' volume ' + $Target + ' must be bind, got ' + $actualType) }
            if ($actualSource -ne $expectedSource) { throw ('Service ' + $Service + ' volume ' + $Target + ' must use ' + $expectedSource + ', got ' + $actualSource) }
          }

          Set-Location -LiteralPath $env:DEPLOY_PATH
          Assert-PathExists $env:EXPECTED_POSTGRES_DIR
          Assert-PathExists $env:EXPECTED_STORAGE_DIR
          Assert-PathExists $env:EXPECTED_REDIS_DIR

          $configJson = docker compose --env-file .env -f docker-compose.yml config --format json
          if ($LASTEXITCODE -ne 0) { throw 'docker compose config failed.' }
          $config = ($configJson -join [Environment]::NewLine) | ConvertFrom-Json

          Assert-ComposeBind $config 'postgres' '/var/lib/postgresql/data' $env:EXPECTED_POSTGRES_DIR
          Assert-ComposeBind $config 'redis' '/data' $env:EXPECTED_REDIS_DIR
          Assert-ComposeBind $config 'api' '/data' $env:EXPECTED_STORAGE_DIR
          Assert-ComposeBind $config 'worker' '/data' $env:EXPECTED_STORAGE_DIR

      - name: Deploy via local Docker Compose
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location -LiteralPath $env:DEPLOY_PATH
          $dockerConfig = Join-Path $env:TEMP ('frame-processor-docker-config-' + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Force -Path $dockerConfig | Out-Null
          $auth = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:DOCKERHUB_USERNAME + ':' + $env:DOCKERHUB_TOKEN))
          $configJson = '{"auths":{"https://index.docker.io/v1/":{"auth":"' + $auth + '"},"registry-1.docker.io":{"auth":"' + $auth + '"}}}'
          [System.IO.File]::WriteAllText((Join-Path $dockerConfig 'config.json'), $configJson, (New-Object System.Text.UTF8Encoding -ArgumentList $false))

          try {
            $images = @(
              'postgres:16-alpine',
              'redis:7-alpine',
              ($env:DOCKERHUB_USERNAME + '/frame-processor-api:' + $env:IMAGE_TAG),
              ($env:DOCKERHUB_USERNAME + '/frame-processor-worker:' + $env:IMAGE_TAG),
              ($env:DOCKERHUB_USERNAME + '/frame-processor-web:' + $env:IMAGE_TAG)
            )
            foreach ($image in $images) {
              docker --config $dockerConfig pull $image
              if ($LASTEXITCODE -ne 0) { throw ('docker pull failed for ' + $image) }
            }

            docker --config $dockerConfig compose --env-file .env -f docker-compose.yml up -d --pull never --force-recreate --no-build --remove-orphans postgres redis api worker web
            if ($LASTEXITCODE -ne 0) { throw 'docker compose up failed.' }
            docker --config $dockerConfig compose --env-file .env -f docker-compose.yml ps
          }
          finally {
            Remove-Item -LiteralPath $dockerConfig -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Verify running images, restart policies, and G drive mounts
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Normalize-PathValue([string]$Value) {
            if (-not $Value) { return $null }
            $path = $Value.Replace('\', '/').TrimEnd('/')
            if ($path -match '^/run/desktop/mnt/host/([a-zA-Z])/(.+)') {
              return ($Matches[1].ToUpper() + ':/' + $Matches[2]).TrimEnd('/')
            }
            if ($path -match '^/host_mnt/([a-zA-Z])/(.+)') {
              return ($Matches[1].ToUpper() + ':/' + $Matches[2]).TrimEnd('/')
            }
            return $path
          }

          function Inspect-Container([string]$Container) {
            $inspectJson = docker inspect $Container
            if ($LASTEXITCODE -ne 0) { throw ('docker inspect failed for ' + $Container) }
            return @(($inspectJson -join [Environment]::NewLine) | ConvertFrom-Json)[0]
          }

          function Assert-ContainerBind([string]$Container, [string]$Destination, [string]$ExpectedSource) {
            $containerInfo = Inspect-Container $Container
            $foundMounts = @($containerInfo.Mounts | Where-Object { $_.Destination -eq $Destination })
            if ($foundMounts.Count -ne 1) { throw ('Container ' + $Container + ' must have exactly one mount for ' + $Destination) }

            $mount = $foundMounts[0]
            $actualType = [string]$mount.Type
            $actualSource = Normalize-PathValue ([string]$mount.Source)
            $expectedSource = Normalize-PathValue $ExpectedSource
            if ($actualType -ne 'bind') { throw ('Container ' + $Container + ' mount ' + $Destination + ' must be bind, got ' + $actualType) }
            if ($actualSource -like '*/var/lib/docker/volumes/*') { throw ('Container ' + $Container + ' uses Docker named volume storage: ' + $actualSource) }
            if ($actualSource -ne $expectedSource) { throw ('Container ' + $Container + ' mount ' + $Destination + ' must use ' + $expectedSource + ', got ' + $actualSource) }
          }

          function Assert-ContainerImage([string]$Container, [string]$ExpectedImage) {
            $containerInfo = Inspect-Container $Container
            $actualImage = [string]$containerInfo.Config.Image
            if ($actualImage -ne $ExpectedImage) { throw ('Container ' + $Container + ' must use image ' + $ExpectedImage + ', got ' + $actualImage) }
          }

          function Assert-RestartPolicy([string]$Container) {
            $containerInfo = Inspect-Container $Container
            $actualPolicy = [string]$containerInfo.HostConfig.RestartPolicy.Name
            if ($actualPolicy -ne 'unless-stopped') { throw ('Container ' + $Container + ' must use restart policy unless-stopped, got ' + $actualPolicy) }
          }

          $expectedApiImage = $env:DOCKERHUB_USERNAME + '/frame-processor-api:' + $env:IMAGE_TAG
          $expectedWorkerImage = $env:DOCKERHUB_USERNAME + '/frame-processor-worker:' + $env:IMAGE_TAG
          $expectedWebImage = $env:DOCKERHUB_USERNAME + '/frame-processor-web:' + $env:IMAGE_TAG
          Assert-ContainerImage 'frame-processor-api-1' $expectedApiImage
          Assert-ContainerImage 'frame-processor-worker-1' $expectedWorkerImage
          Assert-ContainerImage 'frame-processor-web-1' $expectedWebImage

          foreach ($container in @('frame-processor-api-1', 'frame-processor-worker-1', 'frame-processor-web-1', 'frame-processor-postgres-1', 'frame-processor-redis-1')) {
            Assert-RestartPolicy $container
          }

          Assert-ContainerBind 'frame-processor-postgres-1' '/var/lib/postgresql/data' $env:EXPECTED_POSTGRES_DIR
          Assert-ContainerBind 'frame-processor-redis-1' '/data' $env:EXPECTED_REDIS_DIR
          Assert-ContainerBind 'frame-processor-api-1' '/data' $env:EXPECTED_STORAGE_DIR
          Assert-ContainerBind 'frame-processor-worker-1' '/data' $env:EXPECTED_STORAGE_DIR

          $cudaCheck = docker exec frame-processor-worker-1 python -c "import torch; print(torch.cuda.is_available())"
          if ($LASTEXITCODE -ne 0) { throw 'Worker CUDA check command failed.' }
          if (($cudaCheck -join '').Trim() -ne 'True') { throw ('Worker must see CUDA, got: ' + ($cudaCheck -join ' ')) }

      - name: Health check through web proxy
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            try {
              $response = Invoke-RestMethod -Uri $env:HEALTH_URL -TimeoutSec 10
              $response | ConvertTo-Json -Compress
              if ($response.version -eq $env:EXPECTED_APP_VERSION) { exit 0 }
            }
            catch {
              Write-Host $_.Exception.Message
            }
            Start-Sleep -Seconds 10
          }
          exit 1

      - name: Deployment Summary
        if: always()
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Desktop Deployment Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: ${{ job.status }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runner: DESK-KEVINHOME-frame-processor"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Server: $env:DEPLOY_SERVER_IP"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Deploy path: $env:DEPLOY_PATH"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Image tag: $env:IMAGE_TAG"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Postgres data: $env:EXPECTED_POSTGRES_DIR"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Storage data: $env:EXPECTED_STORAGE_DIR"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Redis data: $env:EXPECTED_REDIS_DIR"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Health: $env:HEALTH_URL"
