name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "models/**"
      - "services/**"
      - "worker/**"
      - "alembic/**"
      - "deploy/**"
      - "web/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "alembic.ini"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'kevin950805' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: frame-processor-api
            file: deploy/api.Dockerfile
            build-args: |
              TORCH_WHEEL_INDEX=https://download.pytorch.org/whl/cpu
          - service: worker
            image: frame-processor-worker
            file: deploy/api.Dockerfile
            build-args: |
              TORCH_WHEEL_INDEX=https://download.pytorch.org/whl/cu126
          - service: web
            image: frame-processor-web
            file: deploy/web.Dockerfile
            build-args: |
              VITE_API_BASE_URL=/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${{ matrix.service }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest alias: \`${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
